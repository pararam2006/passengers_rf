<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Панель администратора</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <div class="container admin-container">
        <h1>Панель администратора</h1>
        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>ФИО</th>
                    <th>Транспорт</th>
                    <th>Дата</th>
                    <th>Оплата</th>
                    <th>Статус</th>
                    <th>Действие</th>
                </tr>
            </thead>
            <tbody id="adminTable">
                
            </tbody>
        </table>
    </div>
    <script>
        loadApplications()
        async function loadApplications() {
            try {
                const response = await fetch('/admin/applications')
                const applications = response.json()
                const table = document.getElementById('adminTable')
                table.innerHTML = ''
                applications.forEach(app => {
                    const row = document.createElement('tr')
                    row.innerHTML = `
                        <td>${app.id}</td>
                        <td>${app.full_name}</td>
                        <td>${app.transport_type}</td>
                        <td>${formatDate(app.start_date)}</td>
                        <td>${app.payment_method}</td>
                        <td>
                            <select id="status-${app.id}"
                                <option value="Новая"
                                    ${app.status === 'Новая' ? 'selected' : ''}>
                                    Новая
                                </option>
                                <option value="Подтверждена"
                                    ${app.status === 'Подтверждена' ? 'selected' : ''}>
                                    Подтверждена
                                </option>                            
                                <option value="Отклонена"
                                    ${app.status === 'Отклонена' ? 'selected' : ''}>
                                    Отклонена
                                </option>
                            </select>
                        </td>

                        <td>
                            <button onclick=updateStatus(${app.id})>Сохранить</button>
                        </td>
                    `
                    table.appendChild(row)
                });
            } catch(error) {
                console.error(error)
                alert("Ошибка загрузки заявок")
            }
        }

        async function updateStatus(id) {
            const select = document.getElementById(`status-${id}`)
            const status = select.value
            try {
                const response = await fetch('/admin/status/${id}', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        status: status
                    })
                })
                const result = await response.text()
                alert(result)
            } catch(error) {
                console.error(error)
            }
        }
        function formatDate(dateString) {
            const date = new Date(dateString)
            return date.toLocaleDateString('ru-RU')
        }
    </script>
</body>
</html>
